services:
  db:
    image: postgres:16-alpine
    container_name: omiryn-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-omiryn}
      POSTGRES_USER: ${POSTGRES_USER:-omiryn}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-omiryn}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-omiryn} -d ${POSTGRES_DB:-omiryn}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
